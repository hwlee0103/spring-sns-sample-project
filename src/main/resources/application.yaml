spring:
  application:
    name: spring-sns-sample-project
  profiles:
    active: dev
  session:
    store-type: redis
    timeout: 30m
    redis:
      repository-type: indexed
      namespace: sns
  data:
    web:
      pageable:
        max-page-size: 100
server:
  servlet:
    session:
      cookie:
        secure: true
        http-only: true
        same-site: lax
  error:
    include-stacktrace: never
app:
  session:
    max-sessions-per-user: 3
    absolute-timeout: 24h
  rate-limit:
    ip-requests-per-minute: 20
    max-buckets: 10000
    bucket-expiry: 10m
