# password4j Argon2 configuration
# Spring Security 의 Argon2Password4jPasswordEncoder 가 사용하는 설정.
# 미설정 시 라이브러리가 WARN 로그를 출력하므로 명시적으로 권장값을 지정한다.
#
# 참고: Spring Security 5.8 의 Argon2PasswordEncoder.defaults 는
#   saltLength=16, hashLength=32, parallelism=1, memory=19456 (19MB), iterations=2 였음.
#   아래는 동등 이상의 보안 수준을 유지하는 설정이다.

hash.argon2.memory=19456
hash.argon2.iterations=2
hash.argon2.length=32
hash.argon2.parallelism=1
hash.argon2.type=id
hash.argon2.version=19

global.salt.length=16
